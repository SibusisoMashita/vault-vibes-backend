name: Deploy Prod Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_GITHUB_DEPLOY_ROLE_ARN: arn:aws:iam::861870144419:role/vaultvibes-prod-github-deploy-role
  ECR_REPOSITORY: vaultvibes-api
  ECS_CLUSTER: vault-vibes-cluster
  ECS_SERVICE: vault-backend-service
  ECS_TASK_FAMILY: vault-backend-task
  ECS_TASK_TEMPLATE: infrastructure/ecs-task-definition.prod.template.json
  DB_SECRET_NAME: vaultvibes/prod/db
  APP_SECRET_NAME: vaultvibes/prod/app
  LOG_GROUP: /ecs/vault-backend

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B test

  deploy:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build package
        run: mvn -B -DskipTests package

      - name: Validate AWS role configuration
        run: |
          ROLE_INPUT="${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}"
          if [ -z "$ROLE_INPUT" ]; then
            ROLE_INPUT="$AWS_GITHUB_DEPLOY_ROLE_ARN"
          fi
          if [ -z "$ROLE_INPUT" ]; then
            echo "Missing AWS deploy role. Set secrets.AWS_GITHUB_DEPLOY_ROLE_ARN or env.AWS_GITHUB_DEPLOY_ROLE_ARN." >&2
            exit 1
          fi
          echo "Using deploy role ARN for OIDC auth."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN != '' && secrets.AWS_GITHUB_DEPLOY_ROLE_ARN || env.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          if aws ecr describe-images --repository-name "$ECR_REPOSITORY" --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Image tag already exists in immutable ECR repo; reusing $IMAGE_URI"
          else
            docker build -t "$IMAGE_URI" .
            docker push "$IMAGE_URI"
          fi

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Resolve secret ARNs
        id: secret-arns
        run: |
          DB_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id "$DB_SECRET_NAME" --query 'ARN' --output text)
          APP_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id "$APP_SECRET_NAME" --query 'ARN' --output text)
          echo "db_secret_arn=$DB_SECRET_ARN" >> "$GITHUB_OUTPUT"
          echo "app_secret_arn=$APP_SECRET_ARN" >> "$GITHUB_OUTPUT"

      - name: Resolve ECS role ARNs
        id: ecs-roles
        run: |
          ECS_TASK_EXECUTION_ROLE_ARN="${{ secrets.ECS_TASK_EXECUTION_ROLE_ARN }}"
          ECS_TASK_ROLE_ARN="${{ secrets.ECS_TASK_ROLE_ARN }}"

          if [ -z "$ECS_TASK_EXECUTION_ROLE_ARN" ] || [ -z "$ECS_TASK_ROLE_ARN" ]; then
            CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text)

            if [ -z "$CURRENT_TASK_DEF_ARN" ] || [ "$CURRENT_TASK_DEF_ARN" = "None" ]; then
              echo "Unable to resolve current ECS task definition from service $ECS_SERVICE in cluster $ECS_CLUSTER." >&2
              echo "Set secrets.ECS_TASK_EXECUTION_ROLE_ARN and secrets.ECS_TASK_ROLE_ARN." >&2
              exit 1
            fi

            if [ -z "$ECS_TASK_EXECUTION_ROLE_ARN" ]; then
              ECS_TASK_EXECUTION_ROLE_ARN=$(aws ecs describe-task-definition \
                --task-definition "$CURRENT_TASK_DEF_ARN" \
                --query 'taskDefinition.executionRoleArn' \
                --output text)
            fi

            if [ -z "$ECS_TASK_ROLE_ARN" ]; then
              ECS_TASK_ROLE_ARN=$(aws ecs describe-task-definition \
                --task-definition "$CURRENT_TASK_DEF_ARN" \
                --query 'taskDefinition.taskRoleArn' \
                --output text)
            fi
          fi

          if [ -z "$ECS_TASK_EXECUTION_ROLE_ARN" ] || [ "$ECS_TASK_EXECUTION_ROLE_ARN" = "None" ]; then
            echo "Missing executionRoleArn for ECS task definition. Set secrets.ECS_TASK_EXECUTION_ROLE_ARN." >&2
            exit 1
          fi

          if [ -z "$ECS_TASK_ROLE_ARN" ] || [ "$ECS_TASK_ROLE_ARN" = "None" ]; then
            echo "Missing taskRoleArn for ECS task definition. Set secrets.ECS_TASK_ROLE_ARN." >&2
            exit 1
          fi

          echo "execution_role_arn=$ECS_TASK_EXECUTION_ROLE_ARN" >> "$GITHUB_OUTPUT"
          echo "task_role_arn=$ECS_TASK_ROLE_ARN" >> "$GITHUB_OUTPUT"

      - name: Render task definition
        run: |
          ECS_TASK_EXECUTION_ROLE_ARN=${{ steps.ecs-roles.outputs.execution_role_arn }}
          ECS_TASK_ROLE_ARN=${{ steps.ecs-roles.outputs.task_role_arn }}
          IMAGE_URI=${{ steps.image.outputs.image_uri }}
          DB_SECRET_ARN=${{ steps.secret-arns.outputs.db_secret_arn }}
          APP_SECRET_ARN=${{ steps.secret-arns.outputs.app_secret_arn }}

          sed \
            -e "s#__ECS_EXECUTION_ROLE_ARN__#$ECS_TASK_EXECUTION_ROLE_ARN#g" \
            -e "s#__ECS_TASK_ROLE_ARN__#$ECS_TASK_ROLE_ARN#g" \
            -e "s#__IMAGE_URI__#$IMAGE_URI#g" \
            -e "s#__DB_SECRET_ARN__#$DB_SECRET_ARN#g" \
            -e "s#__APP_SECRET_ARN__#$APP_SECRET_ARN#g" \
            -e "s#__LOG_GROUP__#$LOG_GROUP#g" \
            -e "s#__AWS_REGION__#$AWS_REGION#g" \
            "$ECS_TASK_TEMPLATE" > task-definition.rendered.json

      - name: Register new task definition
        id: register-task
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register-task.outputs.task_def_arn }}" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

