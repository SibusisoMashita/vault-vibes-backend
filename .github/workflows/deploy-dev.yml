name: Deploy Dev Backend

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: backend-deploy-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vaultvibes-api
  ECS_CLUSTER: vault-vibes-cluster
  ECS_SERVICE: vault-dev-backend-service
  ECS_TASK_FAMILY: vault-dev-backend-task
  ECS_TASK_TEMPLATE: infrastructure/ecs-task-definition.dev.template.json
  DB_SECRET_NAME: vaultvibes/dev/backend/db
  APP_SECRET_NAME: vaultvibes/dev/backend/app
  LOG_GROUP: /ecs/vault-dev-backend

jobs:
  check:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B test

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build package
        run: mvn -B -DskipTests package

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: dev-${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          if aws ecr describe-images --repository-name "$ECR_REPOSITORY" \
               --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Image already exists in ECR; reusing $IMAGE_URI"
          else
            docker build -t "$IMAGE_URI" .
            docker push "$IMAGE_URI"
          fi

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Resolve secret ARNs
        id: secret-arns
        run: |
          DB_SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "$DB_SECRET_NAME" --query 'ARN' --output text)
          APP_SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "$APP_SECRET_NAME" --query 'ARN' --output text)
          echo "db_secret_arn=$DB_SECRET_ARN" >> "$GITHUB_OUTPUT"
          echo "app_secret_arn=$APP_SECRET_ARN" >> "$GITHUB_OUTPUT"

      - name: Resolve ECS role ARNs
        id: ecs-roles
        run: |
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' --output text)

          ECS_TASK_EXECUTION_ROLE_ARN=$(aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --query 'taskDefinition.executionRoleArn' --output text)

          ECS_TASK_ROLE_ARN=$(aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --query 'taskDefinition.taskRoleArn' --output text)

          echo "execution_role_arn=$ECS_TASK_EXECUTION_ROLE_ARN" >> "$GITHUB_OUTPUT"
          echo "task_role_arn=$ECS_TASK_ROLE_ARN" >> "$GITHUB_OUTPUT"

      - name: Render task definition
        run: |
          ECS_TASK_EXECUTION_ROLE_ARN=${{ steps.ecs-roles.outputs.execution_role_arn }}
          ECS_TASK_ROLE_ARN=${{ steps.ecs-roles.outputs.task_role_arn }}
          IMAGE_URI=${{ steps.image.outputs.image_uri }}
          DB_SECRET_ARN=${{ steps.secret-arns.outputs.db_secret_arn }}
          APP_SECRET_ARN=${{ steps.secret-arns.outputs.app_secret_arn }}
          COGNITO_ISSUER_URI="https://cognito-idp.us-east-1.amazonaws.com/${{ vars.DEV_COGNITO_USER_POOL_ID }}"

          sed \
            -e "s#__ECS_EXECUTION_ROLE_ARN__#$ECS_TASK_EXECUTION_ROLE_ARN#g" \
            -e "s#__ECS_TASK_ROLE_ARN__#$ECS_TASK_ROLE_ARN#g" \
            -e "s#__IMAGE_URI__#$IMAGE_URI#g" \
            -e "s#__DB_SECRET_ARN__#$DB_SECRET_ARN#g" \
            -e "s#__APP_SECRET_ARN__#$APP_SECRET_ARN#g" \
            -e "s#__LOG_GROUP__#$LOG_GROUP#g" \
            -e "s#__AWS_REGION__#$AWS_REGION#g" \
            -e "s#__COGNITO_ISSUER_URI__#$COGNITO_ISSUER_URI#g" \
            -e "s#__COGNITO_USER_POOL_ID__#${{ vars.DEV_COGNITO_USER_POOL_ID }}#g" \
            -e "s#__COGNITO_CLIENT_ID__#${{ vars.DEV_COGNITO_API_CLIENT_ID }}#g" \
            "$ECS_TASK_TEMPLATE" > task-definition.rendered.json

      - name: Validate rendered task definition JSON
        run: python3 -m json.tool task-definition.rendered.json >/dev/null

      - name: Register new task definition
        id: register-task
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register-task.outputs.task_def_arn }}" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" || {
              echo "Service failed to stabilize. Dumping events:"
              aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$ECS_SERVICE" \
                --query 'services[0].events[0:10]'
              exit 1
            }

      - name: Health check
        run: |
          echo "Checking https://dev-api.vaultvibes.co.za/actuator/health"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://dev-api.vaultvibes.co.za/actuator/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts" >&2
          exit 1